name: Gitleaks
permissions:
  contents: read
  pull-requests: read
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: zricethezav/gitleaks-action@v2
        with:
          args: --no-git --redact --config=.gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
