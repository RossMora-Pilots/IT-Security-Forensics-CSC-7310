name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  ci-default:
    name: ci/default
    runs-on: ubuntu-latest
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Sanity
        run: python -V && echo "CI baseline is healthy"
